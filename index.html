<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kasir Pro v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .active-tab { background-color: #4338ca; border-left: 4px solid #facc15; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Mobile Drawer Logic */
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 1024px) {
            #sidebar.closed { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR SYSTEM -->
        <aside id="sidebar" class="fixed lg:relative w-72 h-full bg-indigo-900 text-white flex flex-col shadow-2xl z-40 closed lg:translate-x-0">
            <div class="p-6">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="bg-yellow-400 p-2 rounded-lg text-indigo-900">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                            </svg>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight">SMART KASIR</h1>
                    </div>
                    <!-- Close button for mobile -->
                    <button onclick="toggleSidebar()" class="lg:hidden text-white text-2xl">&times;</button>
                </div>
                
                <nav class="space-y-1">
                    <button onclick="System.UI.switchSection('pos')" id="nav-pos" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-indigo-800 active-tab">
                        <span>🛒</span> Kasir (POS)
                    </button>
                    <button onclick="System.UI.switchSection('inventory')" id="nav-inventory" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-indigo-800">
                        <span>📦</span> Inventori
                    </button>
                    <button onclick="System.UI.switchSection('report')" id="nav-report" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-indigo-800">
                        <span>📊</span> Laporan
                    </button>
                </nav>
            </div>

            <div class="mt-auto p-6 bg-indigo-950/50">
                <div class="p-4 bg-indigo-800/50 rounded-2xl border border-indigo-700/50">
                    <p class="text-[10px] uppercase font-bold text-indigo-300 mb-2">Device Status</p>
                    <div class="flex items-center gap-2 text-xs mb-3">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                        </span>
                        <span>Printer: Offline</span>
                    </div>
                    <button class="w-full py-2 bg-white text-indigo-900 text-[10px] font-bold rounded-lg hover:bg-yellow-400 transition-colors uppercase">Hubungkan</button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0 h-full relative">
            
            <!-- HEADER -->
            <header class="h-16 lg:h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-slate-100 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div>
                        <h2 id="section-title" class="text-lg lg:text-xl font-bold text-slate-800">Point of Sales</h2>
                        <p id="section-desc" class="hidden md:block text-[10px] lg:text-xs text-slate-500 uppercase tracking-wider">Kelola pesanan pelanggan</p>
                    </div>
                </div>
                <div class="text-right">
                    <p id="real-time-clock" class="text-xs lg:text-sm font-semibold text-slate-700"></p>
                    <p class="text-[10px] text-slate-400">Kasir: Admin Toko</p>
                </div>
            </header>

            <div class="flex-1 overflow-hidden relative">
                
                <!-- SECTION: POS -->
                <section id="section-pos" class="h-full flex flex-col lg:flex-row p-4 lg:p-6 gap-6">
                    <div class="flex-1 flex flex-col min-w-0 h-full">
                        <!-- Filters -->
                        <div class="flex flex-col sm:flex-row gap-3 mb-6">
                            <div class="relative flex-1">
                                <span class="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
                                <input type="text" id="pos-search" placeholder="Cari produk..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all shadow-sm" oninput="System.POS.render()">
                            </div>
                            <select id="pos-category" class="px-4 py-2 bg-white border border-slate-200 rounded-xl outline-none" onchange="System.POS.render()">
                                <option value="Semua">Semua Kategori</option>
                                <option value="Makanan">Makanan</option>
                                <option value="Minuman">Minuman</option>
                            </select>
                        </div>

                        <!-- Product Grid -->
                        <div id="pos-grid" class="flex-1 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3 lg:gap-4 pr-1 custom-scrollbar">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                    <!-- CART SIDEBAR -->
                    <div class="w-full lg:w-96 bg-white rounded-3xl shadow-xl border border-slate-100 flex flex-col overflow-hidden max-h-[40%] lg:max-h-full">
                        <div class="p-4 lg:p-6 border-b border-slate-50 flex justify-between items-center">
                            <h3 class="font-bold flex items-center gap-2">
                                <span>🧾</span> Keranjang
                            </h3>
                            <button onclick="System.POS.clearCart()" class="text-[10px] font-bold text-red-400 uppercase">Kosongkan</button>
                        </div>
                        <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                            <!-- Cart Items -->
                        </div>
                        <div class="p-4 lg:p-6 bg-slate-50 border-t border-slate-200">
                            <div class="flex justify-between font-bold text-lg text-indigo-900 mb-4">
                                <span>Total</span>
                                <span id="summary-total">Rp 0</span>
                            </div>
                            <button onclick="System.POS.checkout()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                                BAYAR SEKARANG
                            </button>
                        </div>
                    </div>
                </section>

                <!-- SECTION: INVENTORY -->
                <section id="section-inventory" class="hidden h-full p-4 lg:p-8 flex flex-col overflow-y-auto custom-scrollbar">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Daftar Produk</h3>
                        <button onclick="System.Inventory.openModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold">+ Produk</button>
                    </div>
                    <div class="bg-white rounded-2xl border border-slate-200 overflow-x-auto shadow-sm">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase">
                                <tr>
                                    <th class="px-6 py-4">Produk</th>
                                    <th class="px-6 py-4">Kategori</th>
                                    <th class="px-6 py-4 text-right">Harga</th>
                                    <th class="px-6 py-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table" class="divide-y divide-slate-100 text-sm">
                                <!-- Injected by JS -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- SECTION: REPORT -->
                <section id="section-report" class="hidden h-full p-4 lg:p-8 overflow-y-auto custom-scrollbar">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div class="bg-indigo-600 p-6 rounded-3xl text-white">
                            <p class="text-indigo-100 text-xs mb-1 uppercase font-semibold">Total Omset</p>
                            <h4 id="report-total-sales" class="text-2xl font-bold text-white">Rp 0</h4>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-200">
                            <p class="text-slate-400 text-xs mb-1 uppercase font-semibold">Transaksi</p>
                            <h4 id="report-transaction-count" class="text-2xl font-bold">0</h4>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-200">
                            <p class="text-slate-400 text-xs mb-1 uppercase font-semibold">Produk Terjual</p>
                            <h4 id="report-total-items" class="text-2xl font-bold">0</h4>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden">
                        <div class="p-4 border-b font-bold">Histori Transaksi</div>
                        <div id="report-history" class="p-4 space-y-2">
                            <!-- Transactions -->
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- MODAL INVENTORY -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-95" id="modal-box">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-slate-800">Detail Produk</h3>
                <button onclick="System.Inventory.closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <form onsubmit="System.Inventory.save(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nama Produk</label>
                    <input type="text" id="inp-name" required class="w-full px-4 py-2 bg-slate-50 border rounded-xl outline-none focus:border-indigo-500 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Kategori</label>
                    <select id="inp-category" class="w-full px-4 py-2 bg-slate-50 border rounded-xl outline-none">
                        <option value="Makanan">Makanan</option>
                        <option value="Minuman">Minuman</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Harga (Rp)</label>
                    <input type="number" id="inp-price" required class="w-full px-4 py-2 bg-slate-50 border rounded-xl outline-none focus:border-indigo-500 transition-all">
                </div>
                <div class="pt-4 flex gap-2">
                    <button type="button" onclick="System.Inventory.closeModal()" class="flex-1 py-3 text-slate-500 font-bold">Batal</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 z-[200] flex items-center gap-3">
        <span id="toast-text">Berhasil</span>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
        }

        const System = {
            Data: {
                products: [
                    { id: 1, name: 'Es Kopi Aren', category: 'Minuman', price: 15000 },
                    { id: 2, name: 'Dimsum Ayam', category: 'Makanan', price: 18000 },
                    { id: 3, name: 'Es Coklat', category: 'Minuman', price: 12000 },
                    { id: 4, name: 'Roti Bakar', category: 'Makanan', price: 10000 }
                ],
                cart: [],
                transactions: []
            },

            UI: {
                init() {
                    setInterval(() => {
                        const now = new Date();
                        document.getElementById('real-time-clock').innerText = now.toLocaleTimeString('id-ID');
                    }, 1000);
                    this.switchSection('pos');
                },

                switchSection(target) {
                    ['pos', 'inventory', 'report'].forEach(s => {
                        document.getElementById(`section-${s}`).classList.add('hidden');
                        document.getElementById(`nav-${s}`).classList.remove('active-tab');
                    });
                    document.getElementById(`section-${target}`).classList.remove('hidden');
                    document.getElementById(`nav-${target}`).classList.add('active-tab');
                    
                    const meta = {
                        pos: ["Kasir POS", "Kelola pesanan pelanggan"],
                        inventory: ["Inventori", "Kelola stok dan menu"],
                        report: ["Laporan", "Performa bisnis Anda"]
                    };
                    document.getElementById('section-title').innerText = meta[target][0];
                    document.getElementById('section-desc').innerText = meta[target][1];

                    if(target === 'pos') System.POS.render();
                    if(target === 'inventory') System.Inventory.render();
                    if(target === 'report') System.Report.render();
                    
                    if (window.innerWidth < 1024) toggleSidebar();
                },

                formatCurrency(num) {
                    return "Rp " + num.toLocaleString('id-ID');
                },

                showToast(text) {
                    const t = document.getElementById('toast');
                    document.getElementById('toast-text').innerText = text;
                    t.classList.replace('opacity-0', 'opacity-100');
                    setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
                }
            },

            POS: {
                render() {
                    const grid = document.getElementById('pos-grid');
                    const search = document.getElementById('pos-search').value.toLowerCase();
                    const category = document.getElementById('pos-category').value;
                    
                    const filtered = System.Data.products.filter(p => 
                        (category === 'Semua' || p.category === category) &&
                        p.name.toLowerCase().includes(search)
                    );

                    grid.innerHTML = filtered.map(p => `
                        <div onclick="System.POS.addToCart(${p.id})" class="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm hover:shadow-md hover:border-indigo-200 transition-all cursor-pointer">
                            <div class="h-20 lg:h-24 bg-slate-50 rounded-xl mb-2 flex items-center justify-center text-2xl">
                                ${p.category === 'Minuman' ? '🥤' : '🍔'}
                            </div>
                            <h4 class="font-bold text-xs lg:text-sm truncate">${p.name}</h4>
                            <p class="text-indigo-600 font-bold text-xs">${System.UI.formatCurrency(p.price)}</p>
                        </div>
                    `).join('');
                    this.renderCart();
                },

                addToCart(id) {
                    const prod = System.Data.products.find(p => p.id === id);
                    const exist = System.Data.cart.find(c => c.id === id);
                    if (exist) exist.qty++;
                    else System.Data.cart.push({ ...prod, qty: 1 });
                    this.renderCart();
                },

                updateQty(id, delta) {
                    const item = System.Data.cart.find(c => c.id === id);
                    item.qty += delta;
                    if (item.qty <= 0) System.Data.cart = System.Data.cart.filter(c => c.id !== id);
                    this.renderCart();
                },

                clearCart() {
                    System.Data.cart = [];
                    this.renderCart();
                },

                renderCart() {
                    const list = document.getElementById('cart-list');
                    if (System.Data.cart.length === 0) {
                        list.innerHTML = `<div class="text-center py-10 opacity-30 text-xs">Kosong</div>`;
                        document.getElementById('summary-total').innerText = 'Rp 0';
                        return;
                    }
                    list.innerHTML = System.Data.cart.map(i => `
                        <div class="flex items-center justify-between bg-white p-2 rounded-xl border border-slate-50 shadow-sm">
                            <div class="flex-1 min-w-0 pr-2">
                                <p class="text-xs font-bold truncate">${i.name}</p>
                                <p class="text-[10px] text-slate-400">${System.UI.formatCurrency(i.price)}</p>
                            </div>
                            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                                <button onclick="System.POS.updateQty(${i.id}, -1)" class="w-5 h-5 flex items-center justify-center font-bold text-slate-500">-</button>
                                <span class="text-xs font-bold">${i.qty}</span>
                                <button onclick="System.POS.updateQty(${i.id}, 1)" class="w-5 h-5 flex items-center justify-center font-bold text-slate-500">+</button>
                            </div>
                        </div>
                    `).join('');
                    const total = System.Data.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                    document.getElementById('summary-total').innerText = System.UI.formatCurrency(total);
                },

                checkout() {
                    if (System.Data.cart.length === 0) return System.UI.showToast('Keranjang kosong!');
                    const total = System.Data.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                    const totalItems = System.Data.cart.reduce((s, i) => s + i.qty, 0);
                    
                    System.Data.transactions.unshift({
                        id: 'TX' + Date.now(),
                        date: new Date(),
                        total: total,
                        items: totalItems
                    });

                    System.Data.cart = [];
                    System.UI.showToast('Pembayaran Berhasil!');
                    System.UI.switchSection('report');
                }
            },

            Inventory: {
                render() {
                    const tbody = document.getElementById('inventory-table');
                    tbody.innerHTML = System.Data.products.map(p => `
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-3 font-bold text-slate-700">${p.name}</td>
                            <td class="px-6 py-3 text-slate-400">${p.category}</td>
                            <td class="px-6 py-3 text-right font-bold text-indigo-600">${System.UI.formatCurrency(p.price)}</td>
                            <td class="px-6 py-3 text-center">
                                <button onclick="System.Inventory.delete(${p.id})" class="text-red-400 hover:text-red-600 font-bold">Hapus</button>
                            </td>
                        </tr>
                    `).join('');
                },
                openModal() {
                    document.getElementById('modal-container').classList.remove('hidden');
                    setTimeout(() => document.getElementById('modal-box').classList.remove('scale-95'), 10);
                },
                closeModal() {
                    document.getElementById('modal-box').classList.add('scale-95');
                    setTimeout(() => document.getElementById('modal-container').classList.add('hidden'), 200);
                },
                save(e) {
                    e.preventDefault();
                    const name = document.getElementById('inp-name').value;
                    const cat = document.getElementById('inp-category').value;
                    const price = parseInt(document.getElementById('inp-price').value);
                    
                    System.Data.products.unshift({ id: Date.now(), name, category: cat, price });
                    this.closeModal();
                    this.render();
                    System.UI.showToast('Produk Tersimpan');
                },
                delete(id) {
                    if(confirm('Hapus produk ini?')) {
                        System.Data.products = System.Data.products.filter(p => p.id !== id);
                        this.render();
                    }
                }
            },

            Report: {
                render() {
                    const history = document.getElementById('report-history');
                    const total = System.Data.transactions.reduce((s, t) => s + t.total, 0);
                    const items = System.Data.transactions.reduce((s, t) => s + t.items, 0);

                    document.getElementById('report-total-sales').innerText = System.UI.formatCurrency(total);
                    document.getElementById('report-transaction-count').innerText = System.Data.transactions.length;
                    document.getElementById('report-total-items').innerText = items;

                    if (System.Data.transactions.length === 0) {
                        history.innerHTML = `<p class="text-center py-6 text-slate-400 italic text-xs">Belum ada transaksi</p>`;
                        return;
                    }

                    history.innerHTML = System.Data.transactions.map(t => `
                        <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <div>
                                <p class="text-xs font-bold text-slate-800">${t.id}</p>
                                <p class="text-[9px] text-slate-400">${t.date.toLocaleString('id-ID')}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold text-indigo-600">${System.UI.formatCurrency(t.total)}</p>
                                <p class="text-[9px] text-slate-400">${t.items} item</p>
                            </div>
                        </div>
                    `).join('');
                }
            }
        };

        // Boot system
        window.onload = () => System.UI.init();
    </script>
</body>
</html>
