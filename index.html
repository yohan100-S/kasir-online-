<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kasir Pro v2.0 - Optimized Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .active-tab { background-color: #4338ca; border-left: 4px solid #facc15; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Mobile Cart Bottom Sheet Logic */
        @media (max-width: 1023px) {
            #sidebar.closed { transform: translateX(-100%); }
            #cart-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 50;
                height: 80vh;
                transform: translateY(100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 2rem 2rem 0 0;
            }
            #cart-panel.open { transform: translateY(0); }
            #mobile-cart-bar { display: flex; }
        }
        
        @media (min-width: 1024px) {
            #mobile-cart-bar { display: none; }
            #cart-panel { transform: none !important; height: 100% !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

    <!-- OVERLAYS -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-30 hidden"></div>
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[45] hidden"></div>

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed lg:relative w-72 h-full bg-indigo-900 text-white flex flex-col shadow-2xl z-[55] closed lg:translate-x-0">
            <div class="p-6">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="bg-yellow-400 p-2 rounded-lg text-indigo-900">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                            </svg>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight">SMART KASIR</h1>
                    </div>
                    <button onclick="toggleSidebar()" class="lg:hidden text-white/50 hover:text-white p-2 text-2xl">&times;</button>
                </div>
                
                <nav class="space-y-1">
                    <button onclick="System.UI.switchSection('pos')" id="nav-pos" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-indigo-800 active-tab">
                        <span class="text-xl">🛒</span> <span>Kasir (POS)</span>
                    </button>
                    <button onclick="System.UI.switchSection('inventory')" id="nav-inventory" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-indigo-800">
                        <span class="text-xl">📦</span> <span>Inventori</span>
                    </button>
                    <button onclick="System.UI.switchSection('report')" id="nav-report" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-indigo-800">
                        <span class="text-xl">📊</span> <span>Laporan</span>
                    </button>
                </nav>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0 h-full relative">
            <header class="h-16 lg:h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2.5 bg-slate-100 rounded-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h2 id="section-title" class="text-lg lg:text-xl font-bold text-slate-800 tracking-tight">Point of Sales</h2>
                </div>
                <div class="hidden md:block text-right">
                    <p id="real-time-clock" class="text-sm font-semibold text-slate-700"></p>
                    <p class="text-[10px] text-slate-400">Admin Mode</p>
                </div>
            </header>

            <div class="flex-1 overflow-hidden relative">
                <!-- POS SECTION -->
                <section id="section-pos" class="h-full flex flex-col lg:flex-row overflow-hidden">
                    <div class="flex-1 flex flex-col min-w-0 h-full p-4 lg:p-6 pb-24 lg:pb-6">
                        <div class="flex gap-3 mb-4 shrink-0">
                            <input type="text" id="pos-search" placeholder="Cari menu..." class="flex-1 pl-4 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm" oninput="System.POS.render()">
                            <select id="pos-category" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none" onchange="System.POS.render()">
                                <option value="Semua">Semua</option>
                                <option value="Makanan">Makanan</option>
                                <option value="Minuman">Minuman</option>
                            </select>
                        </div>

                        <div id="pos-grid" class="flex-1 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3 lg:gap-4 custom-scrollbar">
                            <!-- Injected -->
                        </div>
                    </div>

                    <!-- CART PANEL (Optimized for Mobile Sheet) -->
                    <div id="cart-panel" class="bg-white lg:w-96 border-l border-slate-200 flex flex-col shadow-2xl lg:shadow-none">
                        <!-- Handle bar for mobile -->
                        <div class="lg:hidden w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-3 mb-1" onclick="toggleCart()"></div>
                        
                        <div class="p-5 lg:p-6 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="font-bold flex items-center gap-2">
                                <span class="text-indigo-600">🛒</span> Keranjang
                            </h3>
                            <button onclick="System.POS.clearCart()" class="text-xs font-bold text-red-400 uppercase tracking-tighter">Hapus Semua</button>
                        </div>
                        
                        <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                            <!-- Injected -->
                        </div>

                        <div class="p-6 bg-slate-50 border-t border-slate-200 space-y-4">
                            <div class="space-y-2">
                                <div class="flex justify-between text-sm text-slate-500">
                                    <span>Subtotal</span>
                                    <span id="summary-subtotal">Rp 0</span>
                                </div>
                                <div class="flex justify-between font-extrabold text-xl text-indigo-900 pt-2 border-t border-slate-200">
                                    <span>Total</span>
                                    <span id="summary-total">Rp 0</span>
                                </div>
                            </div>
                            <button onclick="System.POS.checkout()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                                BAYAR SEKARANG
                            </button>
                        </div>
                    </div>
                </section>

                <!-- OTHER SECTIONS (Same as before but with p-4) -->
                <section id="section-inventory" class="hidden h-full p-4 lg:p-8 flex flex-col overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Daftar Menu</h3>
                        <button onclick="System.Inventory.openModal()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold">+ Produk</button>
                    </div>
                    <div class="flex-1 border border-slate-200 rounded-3xl overflow-hidden flex flex-col">
                        <div class="overflow-x-auto flex-1"><table class="w-full text-left min-w-[500px]"><tbody id="inventory-table" class="divide-y divide-slate-100"></tbody></table></div>
                    </div>
                </section>

                <section id="section-report" class="hidden h-full p-4 lg:p-8 overflow-y-auto">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                        <div class="bg-indigo-600 p-6 rounded-[2rem] text-white">
                            <p class="text-indigo-100 text-xs uppercase font-bold">Pendapatan</p>
                            <h4 id="report-total-sales" class="text-2xl font-bold">Rp 0</h4>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-200">
                            <p class="text-slate-400 text-xs uppercase font-bold">Transaksi</p>
                            <h4 id="report-transaction-count" class="text-2xl font-bold">0</h4>
                        </div>
                    </div>
                    <div id="report-history" class="space-y-2"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- MOBILE BOTTOM BAR (The fix for missing checkout) -->
    <div id="mobile-cart-bar" onclick="toggleCart()" class="fixed bottom-0 left-0 right-0 bg-indigo-900 text-white p-4 m-4 rounded-2xl flex items-center justify-between shadow-2xl z-[48] active:scale-95 transition-all hidden">
        <div class="flex items-center gap-3">
            <div class="relative">
                <span class="text-2xl">🛒</span>
                <span id="mobile-cart-count" class="absolute -top-1 -right-1 bg-yellow-400 text-indigo-900 text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
            </div>
            <div>
                <p class="text-[10px] text-indigo-200 uppercase font-bold">Klik untuk Bayar</p>
                <p id="mobile-cart-total" class="font-bold">Rp 0</p>
            </div>
        </div>
        <div class="bg-indigo-700 px-4 py-2 rounded-xl text-sm font-bold">Lihat Keranjang &rsaquo;</div>
    </div>

    <!-- MODAL INVENTORY -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl transform transition-all scale-95" id="modal-box">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold">Produk Baru</h3>
                <button onclick="System.Inventory.closeModal()" class="text-2xl">&times;</button>
            </div>
            <form onsubmit="System.Inventory.save(event)" class="p-6 space-y-4">
                <input type="text" id="inp-name" required placeholder="Nama Produk" class="w-full px-4 py-3 bg-slate-50 border rounded-xl outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <select id="inp-category" class="px-4 py-3 bg-slate-50 border rounded-xl outline-none">
                        <option value="Makanan">Makanan</option>
                        <option value="Minuman">Minuman</option>
                    </select>
                    <input type="number" id="inp-price" required placeholder="Harga" class="px-4 py-3 bg-slate-50 border rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold">Simpan Menu</button>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-24 lg:bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all z-[200] text-sm font-bold">Berhasil</div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function toggleCart() {
            const panel = document.getElementById('cart-panel');
            const overlay = document.getElementById('cart-overlay');
            const isOpen = panel.classList.toggle('open');
            if (isOpen) overlay.classList.remove('hidden');
            else overlay.classList.add('hidden');
        }

        const System = {
            Data: {
                products: [
                    { id: 1, name: 'Es Kopi Aren', category: 'Minuman', price: 15000 },
                    { id: 2, name: 'Dimsum Ayam', category: 'Makanan', price: 20000 },
                    { id: 3, name: 'Matcha Latte', category: 'Minuman', price: 18000 },
                    { id: 4, name: 'Roti Bakar', category: 'Makanan', price: 12000 }
                ],
                cart: [],
                transactions: []
            },

            UI: {
                init() {
                    setInterval(() => {
                        const now = new Date();
                        const clock = document.getElementById('real-time-clock');
                        if(clock) clock.innerText = now.toLocaleTimeString('id-ID');
                    }, 1000);
                    this.switchSection('pos');
                },

                switchSection(target) {
                    ['pos', 'inventory', 'report'].forEach(s => {
                        document.getElementById(`section-${s}`).classList.add('hidden');
                        document.getElementById(`nav-${s}`).classList.remove('active-tab');
                    });
                    document.getElementById(`section-${target}`).classList.remove('hidden');
                    document.getElementById(`nav-${target}`).classList.add('active-tab');
                    document.getElementById('section-title').innerText = target === 'pos' ? 'Point of Sales' : (target === 'inventory' ? 'Inventori' : 'Laporan');
                    
                    // Hide cart bar if not in POS
                    document.getElementById('mobile-cart-bar').style.display = target === 'pos' ? 'flex' : 'none';

                    if(target === 'pos') System.POS.render();
                    if(target === 'inventory') System.Inventory.render();
                    if(target === 'report') System.Report.render();
                    
                    if (window.innerWidth < 1024 && !document.getElementById('sidebar').classList.contains('closed')) toggleSidebar();
                },

                formatCurrency(num) { return "Rp " + num.toLocaleString('id-ID'); },

                showToast(text) {
                    const t = document.getElementById('toast');
                    t.innerText = text;
                    t.classList.replace('opacity-0', 'opacity-100');
                    setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000);
                }
            },

            POS: {
                render() {
                    const grid = document.getElementById('pos-grid');
                    const search = document.getElementById('pos-search').value.toLowerCase();
                    const cat = document.getElementById('pos-category').value;
                    const filtered = System.Data.products.filter(p => (cat === 'Semua' || p.category === cat) && p.name.toLowerCase().includes(search));

                    grid.innerHTML = filtered.map(p => `
                        <div onclick="System.POS.addToCart(${p.id})" class="bg-white rounded-2xl p-3 border border-slate-100 shadow-sm active:scale-95 transition-all cursor-pointer">
                            <div class="h-20 bg-slate-50 rounded-xl mb-2 flex items-center justify-center text-3xl">
                                ${p.category === 'Minuman' ? '🥤' : '🍔'}
                            </div>
                            <h4 class="font-bold text-xs truncate">${p.name}</h4>
                            <p class="text-indigo-600 font-bold text-xs">${System.UI.formatCurrency(p.price)}</p>
                        </div>
                    `).join('');
                    this.renderCart();
                },

                addToCart(id) {
                    const prod = System.Data.products.find(p => p.id === id);
                    const exist = System.Data.cart.find(c => c.id === id);
                    if (exist) exist.qty++;
                    else System.Data.cart.push({ ...prod, qty: 1 });
                    this.renderCart();
                    System.UI.showToast('Item ditambahkan');
                },

                updateQty(id, delta) {
                    const item = System.Data.cart.find(c => c.id === id);
                    item.qty += delta;
                    if (item.qty <= 0) System.Data.cart = System.Data.cart.filter(c => c.id !== id);
                    this.renderCart();
                },

                clearCart() {
                    System.Data.cart = [];
                    this.renderCart();
                },

                renderCart() {
                    const list = document.getElementById('cart-list');
                    const total = System.Data.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                    const count = System.Data.cart.reduce((s, i) => s + i.qty, 0);

                    document.getElementById('summary-subtotal').innerText = System.UI.formatCurrency(total);
                    document.getElementById('summary-total').innerText = System.UI.formatCurrency(total);
                    
                    // Update mobile bar
                    document.getElementById('mobile-cart-total').innerText = System.UI.formatCurrency(total);
                    document.getElementById('mobile-cart-count').innerText = count;

                    if (System.Data.cart.length === 0) {
                        list.innerHTML = `<div class="text-center py-10 opacity-30 text-xs font-bold uppercase tracking-widest">Keranjang Kosong</div>`;
                        return;
                    }

                    list.innerHTML = System.Data.cart.map(i => `
                        <div class="flex items-center justify-between bg-white p-3 rounded-2xl border border-slate-50 shadow-sm">
                            <div class="flex-1 min-w-0 pr-2">
                                <p class="text-xs font-bold truncate">${i.name}</p>
                                <p class="text-[10px] text-slate-400">${System.UI.formatCurrency(i.price)}</p>
                            </div>
                            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl">
                                <button onclick="System.POS.updateQty(${i.id}, -1)" class="w-6 h-6 flex items-center justify-center font-bold text-indigo-600">-</button>
                                <span class="text-xs font-bold">${i.qty}</span>
                                <button onclick="System.POS.updateQty(${i.id}, 1)" class="w-6 h-6 flex items-center justify-center font-bold text-indigo-600">+</button>
                            </div>
                        </div>
                    `).join('');
                },

                checkout() {
                    if (System.Data.cart.length === 0) return;
                    const total = System.Data.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                    System.Data.transactions.unshift({
                        id: 'TX' + Date.now().toString().slice(-6),
                        date: new Date(),
                        total: total,
                        items: System.Data.cart.length
                    });
                    System.Data.cart = [];
                    System.UI.showToast('Pembayaran Berhasil!');
                    if (window.innerWidth < 1024) toggleCart();
                    System.UI.switchSection('report');
                }
            },

            Inventory: {
                render() {
                    const tbody = document.getElementById('inventory-table');
                    tbody.innerHTML = System.Data.products.map(p => `
                        <tr class="text-sm">
                            <td class="px-4 py-4 font-bold text-slate-700">${p.name}</td>
                            <td class="px-4 py-4 text-slate-400 text-xs">${p.category}</td>
                            <td class="px-4 py-4 text-right font-bold text-indigo-600">${System.UI.formatCurrency(p.price)}</td>
                        </tr>
                    `).join('');
                },
                openModal() {
                    document.getElementById('modal-container').classList.remove('hidden');
                    setTimeout(() => document.getElementById('modal-box').classList.remove('scale-95'), 10);
                },
                closeModal() {
                    document.getElementById('modal-box').classList.add('scale-95');
                    setTimeout(() => document.getElementById('modal-container').classList.add('hidden'), 200);
                },
                save(e) {
                    e.preventDefault();
                    System.Data.products.unshift({
                        id: Date.now(),
                        name: document.getElementById('inp-name').value,
                        category: document.getElementById('inp-category').value,
                        price: parseInt(document.getElementById('inp-price').value)
                    });
                    this.closeModal();
                    this.render();
                    e.target.reset();
                }
            },

            Report: {
                render() {
                    const history = document.getElementById('report-history');
                    document.getElementById('report-total-sales').innerText = System.UI.formatCurrency(System.Data.transactions.reduce((s, t) => s + t.total, 0));
                    document.getElementById('report-transaction-count').innerText = System.Data.transactions.length;

                    if (System.Data.transactions.length === 0) {
                        history.innerHTML = `<p class="text-center py-10 opacity-30 text-xs italic">Belum ada transaksi</p>`;
                        return;
                    }
                    history.innerHTML = System.Data.transactions.map(t => `
                        <div class="flex justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <div>
                                <p class="text-xs font-bold">${t.id}</p>
                                <p class="text-[9px] text-slate-400">${t.date.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold text-indigo-600">${System.UI.formatCurrency(t.total)}</p>
                                <p class="text-[9px] text-slate-400">${t.items} menu</p>
                            </div>
                        </div>
                    `).join('');
                }
            }
        };

        window.onload = () => System.UI.init();
    </script>
</body>
</html>
